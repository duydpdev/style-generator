name: CI Check

on:
  pull_request:
    branches: [main, develop]

# Cancel any in-progress run for the same PR when new commits are pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions: only read repo contents (no write access needed for CI checks).
permissions:
  contents: read

env:
  # Use the auto-generated GITHUB_TOKEN so this workflow runs without
  # approval for all PR authors (including bots / Copilot).
  # The PAT (CI_WORKER_REPOSITORY_TOKEN) is only needed for publishing
  # and is kept in release.yml / deploy.yml.
  CI_WORKER_REPOSITORY_TOKEN: ${{ github.token }}
  CI_SERVICE_REPOSITORY_NPM_PUBLIC_URL: "https://npm.pkg.github.com"

jobs:
  check:
    name: Build & Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: "yarn.lock"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build:all
