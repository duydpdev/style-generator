# ─────────────────────────────────────────────────────
# Release — Orchestrator chính
#
# Trigger: push vào main hoặc develop
# Flow:
#   1. Semantic-release tạo tag & version bump
#   2. Detect tag mới (so sánh trước/sau)
#   3. Gọi deploy.yml để build & publish lên npm public
#   4. Gọi back-merge.yml nếu là stable tag trên main
# ─────────────────────────────────────────────────────
name: Release

on:
  push:
    branches: [main, develop]

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  CI_WORKER_REPOSITORY_TOKEN: ${{ secrets.CI_WORKER_REPOSITORY_TOKEN }}
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

jobs:
  # ── 1. Tạo tag ────────────────────────────────────
  release:
    name: Create Release Tag
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      new_release_published: ${{ steps.check.outputs.new_release_published }}
      new_release_tag: ${{ steps.check.outputs.new_release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CI_WORKER_REPOSITORY_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Save tags before release
        run: git tag > /tmp/tags_before.txt

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.CI_WORKER_REPOSITORY_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: yarn release

      - name: Check for new release
        id: check
        run: |
          git fetch --tags --force origin
          git tag > /tmp/tags_after.txt
          NEW_TAG=$(comm -13 <(sort /tmp/tags_before.txt) <(sort /tmp/tags_after.txt) | head -1)
          if [ -n "$NEW_TAG" ]; then
            echo "new_release_published=true" >> $GITHUB_OUTPUT
            echo "new_release_tag=$NEW_TAG" >> $GITHUB_OUTPUT
            echo "✅ New release: $NEW_TAG"
          else
            echo "new_release_published=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No new release"
          fi

  # ── 2. Build & Publish ────────────────────────────
  deploy:
    name: Deploy
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      tag: ${{ needs.release.outputs.new_release_tag }}
    secrets: inherit

  # ── 3. Back-merge (chỉ khi stable tag trên main) ──
  back-merge:
    name: Back-merge
    needs: [release, deploy]
    if: |
      needs.release.outputs.new_release_published == 'true' &&
      github.ref == 'refs/heads/main' &&
      !contains(needs.release.outputs.new_release_tag, '-')
    uses: ./.github/workflows/back-merge.yml
    with:
      version: ${{ needs.release.outputs.new_release_tag }}
    secrets: inherit
