name: CI Check

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  packages: read

env:
  # Use the auto-generated GITHUB_TOKEN so this workflow runs without
  # approval for all PR authors (including bots / Copilot).
  # The PAT (CI_WORKER_REPOSITORY_TOKEN) is only needed for publishing
  # and is kept in release.yml / deploy.yml.
  CI_WORKER_REPOSITORY_TOKEN: ${{ github.token }}
  CI_SERVICE_REPOSITORY_NPM_PUBLIC_URL: "https://npm.pkg.github.com"

jobs:
  check:
    name: Build & Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      # Validate PR title matches [type] subject so squash-merged commits
      # trigger semantic-release correctly (the PR title becomes the squash
      # commit message on main/develop).
      - name: Validate PR title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | yarn commitlint

      # Run lint if available, otherwise just build
      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build
