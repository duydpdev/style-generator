# ─────────────────────────────────────────────────────
# Deploy — Build & publish package lên npm public registry
#
# Reusable workflow, được gọi từ release.yml
# Input: tag name (e.g. v1.2.0 hoặc v1.2.0-DEV.1)
# ─────────────────────────────────────────────────────
name: Deploy

on:
  workflow_call:
    inputs:
      tag:
        description: "Tag to checkout and publish (e.g. v1.2.0)"
        required: true
        type: string

env:
  CI_WORKER_REPOSITORY_TOKEN: ${{ secrets.CI_WORKER_REPOSITORY_TOKEN }}
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Publish Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build:all

      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: yarn npm publish --access public
